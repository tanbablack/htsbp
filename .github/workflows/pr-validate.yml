name: PR validate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'data/threats/domains/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Reject direct human PRs
        # 脅威ドメインの追加はボット (auto/*) か API/MCP (report/*) 経由のみ許可。
        # 手で起票した PR はここで失敗させ merge をブロックする (検証は下で auto/* と report/* に対して走る)。
        run: |
          ref="${{ github.head_ref }}"
          if [[ "$ref" != auto/* && "$ref" != report/* ]]; then
            echo "::error::data/threats/domains/** への手動 PR は受け付けていません。POST /api/report-threat または MCP の report_threat ツールを使ってください。"
            exit 1
          fi
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run validate-pr
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: origin/${{ github.base_ref }}
